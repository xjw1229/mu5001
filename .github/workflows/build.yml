name: 构建 ZTE 高级管家 Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 配置 JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 安装项目依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 核心修复：去掉了所有非法的自定义参数，只保留官方支持的核心参数
      - name: 构建安卓 APK
        run: |
          flet build apk \
            --org com.zte \
            --project-name ZTEManager \
            --build-number ${{ github.run_number }}

      - name: 上传 APK 产物
        uses: actions/upload-artifact@v4
        with:
          name: ZTE-Manager-APK
          path: build/apk/*.apk
