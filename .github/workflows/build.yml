name: Build Android APK
on:
  push:
    branches: 
      - main  
    paths-ignore:
      - 'README.md'
      - 'read.me'
      - '**/*.md'
      - 'pyproject.toml'
      - 'requirements.txt'
  workflow_dispatch: 
permissions:
  contents: read
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'  

      - name: 配置 Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 缓存 Flet SDK 与 Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.flet
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-flet-gradle-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-flet-gradle-

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 还原固定签名密钥库
        run: |
          printf '%s' "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > release.keystore

      # 使用绝对路径来还原文件，确保构建时能找到
      - name: 还原固定签名密钥库
        run: |
          printf '%s' "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > $GITHUB_WORKSPACE/release.keystore

      # 在构建命令中指向绝对路径
      - name: 构建带固定签名的APK
        run: |
          flet build apk \
            --yes \
            --org com.zte \
            --project mu5001 \
            --build-number ${{ github.run_number }} \
            --build-version "1.0.${{ github.run_number }}" \
            --android-signing-key-store $GITHUB_WORKSPACE/release.keystore \
            --android-signing-key-store-password ${{ secrets.KEYSTORE_PASSWORD }} \
            --android-signing-key-alias ${{ secrets.KEY_ALIAS }} \
            --android-signing-key-password ${{ secrets.KEYSTORE_PASSWORD }}
          
          # 移动输出文件
          mv build/apk/*.apk build/apk/MU5001_v1.0.${{ github.run_number }}.apk
      - name: 上传APK
        uses: actions/upload-artifact@v4
        with:
          name: MU5001_App_v1.0.${{ github.run_number }}
          path: build/apk/MU5001_v1.0.${{ github.run_number }}.apk
