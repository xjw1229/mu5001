name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install Flet
        run: pip install flet
        
      # 1. 删除了导致报错的 target 参数，恢复正常的打包指令
      - name: Build APK
        run: yes | flet build apk --org com.zte.manager2026
        
      # 2. 取消盲搜，精准抓取！只上传干干净净的一个 mu5001.apk
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mu5001_App
          path: build/apk/mu5001.apk
