name: 构建 ZTE 高级管家 Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 配置 JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 安装项目依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 终极修复：单行执行，且 project-name 全小写，product 填中文桌面名称
      - name: 构建安卓 APK
        run: flet build apk --org com.zte --project-name zte_manager --product "ZTE高级管家" --build-number ${{ github.run_number }}

      - name: 上传 APK 产物
        uses: actions/upload-artifact@v4
        with:
          name: ZTE-Manager-APK
          path: build/apk/*.apk
