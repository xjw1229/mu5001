name: Build Android APK

on:
  push:
    paths-ignore:
      - 'README.md'
      - 'read.me'
      - '**/*.md'  # 这一行会忽略所有文件夹下的 Markdown 文件，你可以根据需要保留或删除

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        
      - name: 配置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: 配置 Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      # 💡 已经删除了原来“配置 Flutter”的步骤，交给 Flet 自己去下正确的版本
          
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: 构建安卓 APK
        # 💡 在前面加上 yes | ，自动回答 [y/n] 的终端提问，防止流水线卡死报错
        run: yes | flet build apk --org com.zte --project mu5001
        
      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: ZTEManager_App
          path: build/apk/*.apk
