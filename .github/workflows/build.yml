name: Build Android APK

on:
  push:
    branches: 
      - main  
    paths-ignore:
      - 'README.md'
      - 'read.me'
      - '**/*.md'
      - 'pyproject.toml'
      - 'requirements.txt'
  workflow_dispatch: 

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        
      - name: 配置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'  
          
      - name: 配置 Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      #添加 ~/.android 缓存，实现签名证书的持久化
      - name: 缓存 Flet SDK 与 Gradle 与安卓签名
        uses: actions/cache@v4
        with:
          path: |
            ~/.flet
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.android
          key: ${{ runner.os }}-flet-gradle-android-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-flet-gradle-android-
            
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      # 默认全架构打包，并动态生成每次不同的版本号
      - name: 构建安卓 APK
        run: |
          yes | flet build apk \
            --org com.zte \
            --project mu5001 \
            --build-number ${{ github.run_number }} \
            --build-version "1.0.${{ github.run_number }}"
          
          # 重命名生成的 apk 文件，加上版本号
          mv build/apk/*.apk build/apk/MU5001_v1.0.${{ github.run_number }}.apk
        
      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: MU5001_App_v1.0.${{ github.run_number }} 
          # 上传路径改为重命名后的具体文件名
          path: build/apk/MU5001_v1.0.${{ github.run_number }}.apk
