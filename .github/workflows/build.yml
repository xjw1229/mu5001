name: Build Android APK
on:
  push:
    branches: 
      - main  
    paths-ignore:
      - 'README.md'
      - 'read.me'
      - '**/*.md'
  workflow_dispatch: 

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'  

      - name: 配置 Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 缓存 Flet SDK 与 Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.flet
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-flet-gradle-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-flet-gradle-

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 还原固定签名密钥库
        run: |
          printf '%s' "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > $GITHUB_WORKSPACE/release.keystore

      - name: 构建带固定签名的 APK
        env:
          FLET_ANDROID_SIGNING_KEY_STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          FLET_ANDROID_SIGNING_KEY_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          FLET_ANDROID_SIGNING_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          flet build apk \
            --yes \
            --org com.zte \
            --product "mu5001" \
            --build-number ${{ github.run_number }} \
            --build-version "1.0.${{ github.run_number }}" \
            --android-signing-key-store $GITHUB_WORKSPACE/release.keystore
          
          # 移动输出文件并重命名
          mv build/apk/*.apk build/apk/MU5001_v1.0.${{ github.run_number }}.apk
          
      - name: 上传APK
        uses: actions/upload-artifact@v4
        with:
          name: MU5001_App_v1.0.${{ github.run_number }}
          path: build/apk/MU5001_v1.0.${{ github.run_number }}.apk
