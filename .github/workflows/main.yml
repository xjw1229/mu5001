name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      # 配置 Android 编译所需的 Java 环境
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      # 配置 Python 环境
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install Flet
        run: pip install flet
        
      # 💥 终极修复：用 yes 命令强行自动回答 y，完美避开 EOFError 💥
      - name: Build APK
        run: yes | flet build apk
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ZteManagerAPK
          path: build/apk/app-release.apk
